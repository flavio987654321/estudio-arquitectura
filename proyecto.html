<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle del proyecto</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header class="topbar topbar-proyecto" style="display:flex; justify-content:space-between; align-items:center;">
    <h1 style="margin:0;">Desarrollos Silmare S.A.</h1>

    <a href="index.html" aria-label="Volver al inicio"
       style="text-decoration:none; color:#111;">
      ← Volver
    </a>
  </header>

  <main class="proyecto-detalle">
    <section class="hero-proyecto">

      <!-- Fila superior: título + descripción (span 2 columnas) -->
      <div class="hero-text">
        <h2 id="tituloProyecto">Proyecto</h2>
        <p class="texto" id="descProyecto">Descripción del proyecto...</p>
      </div>

      <!-- Columna izquierda: galería -->
      <div class="col-izq">

        <!-- Galería -->
        <div class="galeria" style="display:none">
        <div class="galeria-main">
          <button class="nav prev" aria-label="Anterior" type="button">‹</button>
          <img id="galeriaImg" alt="Foto del proyecto" />
          <button class="nav next" aria-label="Siguiente" type="button">›</button>
        </div>

        <!-- main.js llena miniaturas reales -->
        <div class="galeria-thumbs"></div>
        </div>
      </div>

      <!-- Info -->
      <div class="info-proyecto">
        <div class="acciones" id="accionesProyecto"></div>
      </div>

    </section>

    <!-- Calidad constructiva -->
    <section class="seccion" id="calidadSeccion" style="display:none;">
      <h3>Calidad constructiva</h3>
      <div class="calidad-grid" id="calidadProyecto"></div>
    </section>

    <!-- Unidades -->
    <section class="seccion">
      <h3>Unidades</h3>
      <div class="filtros-unidades" id="filtrosUnidades"></div>
      <!-- main.js renderiza unidades acá -->
      <div class="tabla-unidades" id="listaUnidades"></div>
    </section>
  </main>

  <!-- Lightbox fotos -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="nav prev" id="lightboxPrev" aria-label="Anterior" type="button">‹</button>
    <button class="lightbox-close" id="lightboxClose" aria-label="Cerrar" type="button">✕</button>
    <img id="lightboxImg" alt="Imagen ampliada" loading="lazy" />
    <button class="nav next" id="lightboxNext" aria-label="Siguiente" type="button">›</button>
  </div>

  <a class="wpp-float" id="wppFloat" href="#" target="_blank" rel="noopener" aria-label="Consultar por WhatsApp">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="currentColor" d="M20.52 3.48A11.94 11.94 0 0 0 12.04 0C5.41 0 .01 5.4.01 12.03c0 2.12.55 4.19 1.6 6.02L0 24l6.14-1.61a11.96 11.96 0 0 0 5.9 1.53h.01c6.63 0 12.03-5.4 12.03-12.03 0-3.21-1.25-6.23-3.52-8.41zM12.04 21.5h-.01a9.96 9.96 0 0 1-5.08-1.4l-.36-.21-3.64.95.97-3.55-.24-.36a9.92 9.92 0 1 1 8.36 4.57zm5.5-7.45c-.3-.15-1.77-.87-2.05-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.95 1.16-.17.2-.35.22-.65.07-.3-.15-1.27-.47-2.42-1.5-.9-.8-1.5-1.79-1.68-2.09-.17-.3-.02-.46.13-.6.14-.14.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.61-.92-2.2-.24-.58-.49-.5-.67-.51-.17-.01-.37-.01-.57-.01-.2 0-.52.07-.8.37-.27.3-1.05 1.03-1.05 2.52 0 1.49 1.08 2.93 1.23 3.13.15.2 2.12 3.24 5.13 4.55.72.31 1.28.5 1.72.64.72.23 1.39.2 1.91.12.58-.09 1.77-.72 2.02-1.44.25-.71.25-1.32.17-1.44-.07-.12-.27-.2-.57-.35z"/>
      </svg>
    </a>

  <!-- Panel / modal de PLANOS -->
  <div class="lightbox" id="panelPlanos" aria-hidden="true">
    <button class="lightbox-close" id="planosClose" aria-label="Cerrar" type="button">✕</button>

    <button class="nav prev" id="planosPrev" aria-label="Anterior" type="button">‹</button>
    <img id="planosImg" alt="Plano ampliado" loading="lazy" />
    <button class="nav next" id="planosNext" aria-label="Siguiente" type="button">›</button>

    <div class="galeria-thumbs" id="planosThumbs" style="margin-top:14px;"></div>
  </div>

  <!-- Panel / modal de AVANCES -->
  <div class="lightbox" id="panelAvances" aria-hidden="true">
    <button class="lightbox-close" id="avancesClose" aria-label="Cerrar" type="button">✕</button>

    <div class="avance-viewer">
      <img id="avancesImg" alt="Avance" loading="lazy" />
      <video id="avancesVideo" controls playsinline></video>
    </div>

    <div class="galeria-thumbs" id="avancesThumbs" style="margin-top:14px;"></div>
  </div>

<script type="module" src="js/main.js"></script>

</body>
</html>
